services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scientific_tangle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: docker_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: src
      dockerfile: ScientificTangle.Web/Dockerfile
    ports:
      - "5210:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings:ScientificTangleDatabase=Host=db;Port=5432;Database=scientific_tangle;Username=postgres;Password=docker_password
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: src/ScientificTangle.Frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
